<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/fonts.css" >
    <link rel="stylesheet" href="../css/signup.css">
    
    <link rel="icon" href="../images/icon.png">

    <title>Your SafeChat info</title>
</head>
<body>
    
    <div class="f-height block w400 m-auto relative b-box main ">

        <div class="onboarding block m-auto ">
            <div class="top-menu m-auto flex ">
                <div id="back" class="top-back ">
                    <svg id="Lager_1" style="enable-background:new -265 388.9 64 64;" version="1.1" viewBox="-265 388.9 64 64" xml:space="preserve" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"><path d="M-232.5,405.9h4.5c0.7,0,1.2,0.8,0.9,1.4l-7.3,14.6l7.3,14.6c0.3,0.7-0.2,1.4-0.9,1.4h-4.5c-0.4,0-0.7-0.2-0.9-0.6  l-7.7-15.4l7.7-15.4C-233.2,406.1-232.8,405.9-232.5,405.9z"/></svg>

                </div>
                <div style="overflow: hidden;" class="top-next ">
                    <input type="file" id="file-input" accept="image/*">
                    <img id="selected-image" style="display:none; width: 100%; height: 100%; object-fit: cover;">
                </div>
            </div>

            <div class="onboardingtitle ">
                Tell us more <span class="color1">About</span><span class="color2"> yourself</span><span class="color3">!</span> 
            </div>
            <div class="onboardingsub m-auto ">NOTE: Your username and profile pic are public!</div>

            <div class="welcomes f-width flex m-auto ">
                <div class="d1"></div>
                <div class="d2"></div>
                <div class="d2"></div>
            </div>

            <div class="f-width flex inputs ">
                <input style="text-align: center;" id="username" class="number m-auto" type="text" placeholder="~ username">
            </div>
            

            <div class="continuebtn flex ">
                <button id="next" class="next-btn m-auto">Finish !</button>
            </div>
            

        </div>

        

    </div>

  <script defer>

    document.getElementById("username").focus();

    document.getElementById("back").addEventListener('click', ()=>{
        window.location.href = 'signup.html';
    });




    const code = document.getElementById('country');    
    const no = document.getElementById("username");
    const btn = document.getElementById('next');

    function EnableBtn(){
        nolength = no.value.length;
        if(nolength >= 3){
            btn.style.opacity = '1';
            btn.style.cursor = 'pointer';

            Submit();     


             btn.addEventListener('click', ()=>{               
                

                setTimeout(()=>{

                    window.location.href = "\\main/chat.html";

                },4500);           

             });

            
            
        }else if(nolength <=2){
            btn.style.opacity = '0.4';
            btn.style.cursor = 'not-allowed';
        }
    };



    function Submit(){
        const stl = btn.style.opacity;
        if(stl == '1'){
        btn.addEventListener('click',()=>{            
            btn.innerHTML = '<img class="f-height m-auto" src="../images/motion/2.gif">';
            btn.style.width = '150px';
        });
        } 
        
        
    }
    



    document.addEventListener('DOMContentLoaded', () => {
    EnableBtn(); // Call EnableBtn once the content has fully loaded

    document.getElementById('username').addEventListener('input', () => {
        EnableBtn(); // Call EnableBtn on input
    });
});
  </script>    

<script>
    const fileInput = document.getElementById('file-input');
    const imageContainer = document.getElementById('image-container');
    const selectedImage = document.getElementById('selected-image');
  
    fileInput.addEventListener('change', function () {
      const file = fileInput.files[0]; // Get the selected file
      if (file) {
        const reader = new FileReader();
  
        // When the file is loaded, set it as the image source
        reader.onload = function (e) {
          selectedImage.src = e.target.result; // Set the image source to the file
          selectedImage.style.display = 'block'; // Make the image visible
        };
  
        reader.readAsDataURL(file); // Convert the file to a data URL
      }
    });
  </script>
    
</body>
</html>
